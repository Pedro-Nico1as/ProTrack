name: Deploy ProTrack Web Emulator to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'protrack-web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact (protrack-web)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './protrack-web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
