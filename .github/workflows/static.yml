<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProTrack — Emulador Interativo da Aplicação</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏋️‍♂️</text></svg>">
</head>
<body>

  <!-- Fundo Iluminado de Apresentação -->
  <div class="presentation-bg"></div>

  <!-- Barra de Controle da Apresentação -->
  <header class="presentation-bar">
    <div class="brand-badge">
      <div class="dot"></div>
      ProTrack Demo
    </div>
    <button class="mode-toggle" id="btn-toggle-frame">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      Tela Cheia
    </button>
  </header>

  <!-- Wrapper do Celular -->
  <div class="emulator-wrapper">
    <div class="device-frame">
      
      <!-- Dynamic Island e Barra de Status -->
      <div class="dynamic-island">
        <div class="camera-lens"></div>
      </div>
      <div class="device-status-bar">
        <span id="status-clock">19:16</span>
        <div class="status-icons">
          <span>5G</span>
          <span>100%</span>
        </div>
      </div>

      <!-- Container do App -->
      <div class="app-container">
        <div class="screen-viewport">

          <!-- 1. Tela de Autenticação -->
          <section id="screen-auth" class="screen">
            <div class="auth-logo">Pro<span>Track</span></div>
            <p class="subtitle">Acelere seus resultados com treinos de elite</p>

            <div class="auth-form">
              <input type="email" class="input-field" placeholder="seu@email.com" value="pedro@protrack.app">
              <input type="password" class="input-field" placeholder="••••••••" value="123456">
              <button class="btn btn-primary" id="btn-login-demo">Entrar no ProTrack</button>
              <button class="btn btn-outline" style="font-size: 13px;">Criar nova conta</button>
            </div>
          </section>

          <!-- 2. Tela Home (Dashboard) -->
          <section id="screen-home" class="screen active">
            <div class="app-header">
              <div>
                <div class="app-title">Olá, Pedro 👋</div>
                <div class="subtitle">Você tem 1 treino agendado hoje</div>
              </div>
              <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-highlight); display: flex; align-items: center; justify-content: center; font-weight: 700;">
                PV
              </div>
            </div>

            <!-- Banner de Treino Ativo -->
            <div class="active-banner" onclick="switchTab('ativo')">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div class="pulse-dot"></div>
                <div>
                  <div style="font-size: 14px; font-weight: 700;">Treino em Andamento</div>
                  <div style="font-size: 12px; color: var(--text-secondary);">Arnold Classic • Peito e Costas</div>
                </div>
              </div>
              <span style="font-size: 13px; color: var(--primary); font-weight: 700;">Continuar →</span>
            </div>

            <!-- Resumo Semanal -->
            <div style="font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">PROGRESSO DA SEMANA</div>
            <div class="stats-grid">
              <div class="stat-box">
                <div class="stat-number">4</div>
                <div class="stat-label">Treinos</div>
              </div>
              <div class="stat-box">
                <div class="stat-number">12.4t</div>
                <div class="stat-label">Volume</div>
              </div>
              <div class="stat-box">
                <div class="stat-number">185m</div>
                <div class="stat-label">Tempo</div>
              </div>
            </div>

            <!-- Destaques dos Atletas -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
              <div style="font-size: 14px; font-weight: 700;">FICHAS DE ATLETAS LENDÁRIOS</div>
              <span style="font-size: 12px; color: var(--primary); cursor: pointer;" onclick="switchTab('fichas')">Ver todas</span>
            </div>
            <div id="home-featured-list"></div>
          </section>

          <!-- 3. Tela Fichas Prontas -->
          <section id="screen-fichas" class="screen">
            <div class="app-header">
              <div>
                <div class="app-title">Fichas Prontas</div>
                <div class="subtitle">Modelos profissionais testados por lendas</div>
              </div>
            </div>

            <div class="search-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="search-fichas" placeholder="Buscar ficha por nome ou atleta...">
            </div>

            <div id="fichas-list"></div>
          </section>

          <!-- 4. Tela Montar Treino -->
          <section id="screen-montar" class="screen">
            <div class="app-header">
              <div>
                <div class="app-title">Montar Treino</div>
                <div class="subtitle">Crie um plano sob medida para sua rotina</div>
              </div>
            </div>

            <!-- Seletor de Opções (Remodelado) -->
            <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
              <div class="card" style="border-color: var(--primary); background: linear-gradient(135deg, rgba(228, 50, 50, 0.15) 0%, var(--surface) 100%); cursor: pointer;" onclick="switchTab('fichas')">
                <span class="workout-badge" style="margin-bottom: 8px;">RECOMENDADO</span>
                <div style="font-size: 16px; font-weight: 700;">Importar de Ficha Pronta</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">Escolha um modelo profissional de atleta e adapte como quiser.</div>
              </div>

              <div class="card" style="cursor: pointer;">
                <span class="workout-badge" style="background: var(--surface-highlight); color: var(--text-secondary); margin-bottom: 8px;">LIVRE</span>
                <div style="font-size: 16px; font-weight: 700;">Montar do Zero</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">Monte seu plano com suas próprias repartições e exercícios.</div>
              </div>
            </div>

            <div style="font-weight: 700; font-size: 15px; margin-bottom: 12px;">SUAS REPARTIÇÕES</div>
            <div id="builder-partitions-list"></div>

            <button class="btn btn-primary" onclick="saveCustomPlan()" style="margin-top: 16px;">Salvar Plano Customizado</button>
          </section>

          <!-- 5. Tela Modo Ativo -->
          <section id="screen-ativo" class="screen">
            <div class="app-header">
              <div>
                <div class="app-title" id="active-workout-name">Arnold Classic</div>
                <div class="subtitle" id="active-partition-name">Peito e Costas</div>
              </div>
              <button class="btn btn-outline" style="width: auto; height: 36px; padding: 0 12px; font-size: 12px; color: var(--primary);" onclick="finishActiveWorkout()">Finalizar</button>
            </div>

            <!-- Timer de Descanso -->
            <div class="timer-container">
              <div class="timer-circle">
                <div style="font-size: 11px; color: var(--text-secondary); font-weight: 700; letter-spacing: 1px;">DESCANSO</div>
                <div class="timer-digits" id="timer-digits">01:00</div>
              </div>
              <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" style="width: auto; height: 36px; padding: 0 14px; font-size: 12px;" onclick="startRestTimer(30)">+30s</button>
                <button class="btn btn-outline" style="width: auto; height: 36px; padding: 0 14px; font-size: 12px;" onclick="startRestTimer(60)">60s</button>
                <button class="btn btn-outline" style="width: auto; height: 36px; padding: 0 14px; font-size: 12px;" onclick="startRestTimer(90)">90s</button>
              </div>
            </div>

            <div style="font-weight: 700; font-size: 15px; margin-bottom: 12px;">EXERCÍCIOS</div>
            <div id="active-exercises-list"></div>
          </section>

          <!-- 6. Tela Perfil -->
          <section id="screen-perfil" class="screen">
            <div class="app-header">
              <div>
                <div class="app-title">Perfil</div>
                <div class="subtitle">Estatísticas e configurações de conta</div>
              </div>
            </div>

            <div class="card" style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 54px; height: 54px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800;">
                PV
              </div>
              <div>
                <div style="font-size: 18px; font-weight: 700;">Pedro Vieira</div>
                <div style="font-size: 13px; color: var(--text-secondary);">pedro@protrack.app</div>
              </div>
            </div>

            <div class="card">
              <div style="font-weight: 700; font-size: 14px; margin-bottom: 10px;">HISTÓRICO RECENTE</div>
              <div style="display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle);">
                <span>Arnold Classic - Treino A</span>
                <span style="color: var(--text-secondary);">Hoje</span>
              </div>
              <div style="display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0;">
                <span>Push Pull Legs - Treino B</span>
                <span style="color: var(--text-secondary);">Ontem</span>
              </div>
            </div>

            <button class="btn btn-outline" style="color: var(--primary); margin-top: 16px;" onclick="switchTab('auth')">Sair da Conta</button>
          </section>

        </div>

        <!-- Barra de Navegação Inferior (Bottom Tabs) -->
        <nav class="bottom-tabs">
          <div class="tab-item active" data-tab="home" onclick="switchTab('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
          </div>
          <div class="tab-item" data-tab="fichas" onclick="switchTab('fichas')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span>Fichas</span>
          </div>
          <div class="tab-item" data-tab="montar" onclick="switchTab('montar')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span>Montar</span>
          </div>
          <div class="tab-item" data-tab="perfil" onclick="switchTab('perfil')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Perfil</span>
          </div>
        </nav>

        <!-- Indicador Home do iOS -->
        <div class="home-indicator"></div>
      </div>

    </div>
  </div>

  <!-- Modal 1: Visualização da Ficha -->
  <div class="modal-overlay" id="modal-preview">
    <div class="modal-content">
      <div class="modal-header">
        <div style="font-size: 18px; font-weight: 700;" id="modal-preview-title">Detalhes da Ficha</div>
        <button class="btn btn-outline" style="width: 32px; height: 32px; border-radius: 50%; padding: 0;" onclick="closePreviewModal()">✕</button>
      </div>
      <div style="height: 140px; border-radius: 12px; overflow: hidden; margin-bottom: 14px;">
        <img id="modal-preview-img" style="width: 100%; height: 100%; object-fit: cover;" src="" alt="">
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 14px;" id="modal-preview-desc"></p>
      
      <div style="display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto;" id="modal-preview-tabs"></div>
      <div id="modal-preview-exercises"></div>

      <button class="btn btn-primary" style="margin-top: 16px;" onclick="useCurrentPreviewWorkout()">Usar esta Ficha</button>
    </div>
  </div>

  <!-- Modal 2: Catálogo de Exercícios -->
  <div class="modal-overlay" id="modal-exercises">
    <div class="modal-content">
      <div class="modal-header">
        <div style="font-size: 18px; font-weight: 700;">Selecionar Exercício</div>
        <button class="btn btn-outline" style="width: 32px; height: 32px; border-radius: 50%; padding: 0;" onclick="closeExerciseSelectorModal()">✕</button>
      </div>

      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-exercises" placeholder="Buscar por nome ou grupo muscular...">
      </div>

      <div id="exercises-catalog-list" style="max-height: 350px; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
