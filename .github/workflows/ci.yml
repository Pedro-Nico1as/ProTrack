name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            protrack-mobile/package-lock.json
            protrack-tests/package-lock.json

      - name: Install dependencies (mobile)
        run: npm ci
        working-directory: protrack-mobile

      - name: Install dependencies (tests)
        run: npm ci
        working-directory: protrack-tests

      - name: Run lint
        run: npm run lint
        working-directory: protrack-mobile

      - name: Run tests
        run: |
          # Exclui testes de integração que dependem de Supabase local ativo (connection refused no CI)
          npm test -- --watchAll=false --passWithNoTests --testPathIgnorePatterns='integration/sync/sync-load-and-dedup' 'integration/sync/sync-security'
        working-directory: protrack-tests
