<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- Full gradient definition for the "p" letter -->
    <linearGradient id="pg-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FE7B02"/>
      <stop offset="52%"  stop-color="#FF66F4"/>
      <stop offset="100%" stop-color="#4B73FF"/>
    </linearGradient>
    <radialGradient id="pg-r1" cx="68%" cy="18%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,1,5,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,1,5,0)"/>
    </radialGradient>
    <radialGradient id="pg-r2" cx="18%" cy="28%" r="48%">
      <stop offset="0%"   stop-color="rgba(254,123,2,1)"/>
      <stop offset="100%" stop-color="rgba(254,123,2,0)"/>
    </radialGradient>
    <radialGradient id="pg-r3" cx="82%" cy="68%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,102,244,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,102,244,0)"/>
    </radialGradient>
    <radialGradient id="pg-r4" cx="28%" cy="82%" r="54%">
      <stop offset="0%"   stop-color="rgba(75,115,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(75,115,255,0)"/>
    </radialGradient>
    <!--
      Icon 96px: font-size:82px, align-items:center, justify-content:center, margin-top:12px
      Flex centers the em-box of the text in the 96px container.
      Em-box height = 82px → top of em at (96-82)/2 = 7px, bottom at 89px
      With margin-top:12px → top shifts to 7+12=19px, bottom to 101px (clipped by overflow:hidden)
      For Outfit, ascender ratio ≈ 0.80 of em, so baseline ≈ top_of_em + 82*0.80 = 19 + 65.6 ≈ 85px
      x centering: "p" in Outfit Bold at 82px is roughly 47px wide → x = (96-47)/2 ≈ 24px
      But clipPath text x is the baseline start. We set x to position center.
    -->
    <clipPath id="p-clip-96l">
      <text
        x="4" y="85"
        font-family="'Outfit', sans-serif"
        font-weight="700"
        font-size="82"
        text-anchor="start"
      >p</text>
    </clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
  </style>

  <!-- Background: light rounded square (border-radius:24px) -->
  <rect width="96" height="96" rx="24" fill="#F3F4F6"/>

  <!-- "p" letter with stacked gradient, clipped to its shape -->
  <g clip-path="url(#p-clip-96l)">
    <rect width="96" height="96" fill="url(#pg-base)"/>
    <rect width="96" height="96" fill="url(#pg-r1)"/>
    <rect width="96" height="96" fill="url(#pg-r2)"/>
    <rect width="96" height="96" fill="url(#pg-r3)"/>
    <rect width="96" height="96" fill="url(#pg-r4)"/>
  </g>
</svg>
