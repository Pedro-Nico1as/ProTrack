<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 70" width="256" height="70">
  <!--
    Wordmark ProTrack — versão escura (fundo #080D18)
    Mesmas coordenadas da versão clara, texto branco.
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
    </style>
    <linearGradient id="wd-dot-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FE7B02"/>
      <stop offset="52%"  stop-color="#FF66F4"/>
      <stop offset="100%" stop-color="#4B73FF"/>
    </linearGradient>
    <radialGradient id="wd-dot-r1" cx="68%" cy="18%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,1,5,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,1,5,0)"/>
    </radialGradient>
    <radialGradient id="wd-dot-r2" cx="18%" cy="28%" r="48%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(254,123,2,1)"/>
      <stop offset="100%" stop-color="rgba(254,123,2,0)"/>
    </radialGradient>
    <radialGradient id="wd-dot-r3" cx="82%" cy="68%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,102,244,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,102,244,0)"/>
    </radialGradient>
    <radialGradient id="wd-dot-r4" cx="28%" cy="82%" r="54%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(75,115,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(75,115,255,0)"/>
    </radialGradient>
    <clipPath id="wd-dot-clip">
      <circle cx="249.2" cy="58" r="5"/>
    </clipPath>
  </defs>

  <!-- Fundo escuro -->
  <rect width="256" height="70" fill="#080D18"/>

  <!-- Texto "protrack" branco -->
  <text
    x="0"
    y="54.4"
    font-family="'Outfit', sans-serif"
    font-weight="700"
    font-size="60"
    letter-spacing="-0.5"
    fill="#FFFFFF"
  >protrack</text>

  <!-- Ponto gradiente multi-camada -->
  <g clip-path="url(#wd-dot-clip)">
    <circle cx="249.2" cy="58" r="5" fill="url(#wd-dot-base)"/>
    <circle cx="249.2" cy="58" r="5" fill="url(#wd-dot-r1)"/>
    <circle cx="249.2" cy="58" r="5" fill="url(#wd-dot-r2)"/>
    <circle cx="249.2" cy="58" r="5" fill="url(#wd-dot-r3)"/>
    <circle cx="249.2" cy="58" r="5" fill="url(#wd-dot-r4)"/>
  </g>
</svg>
